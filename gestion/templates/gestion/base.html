<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Order Rae - Gestión</title>
    <!-- Usaremos FontAwesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --linen: #F5F1EA;
            --khaki: #D7C9B8;
            --camel: #B2967D;
            --cocoa: #7D5A44;
            --espresso: #4A342A;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--linen);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR (Izquierda) */
        .sidebar {
            width: 260px;
            background-color: var(--espresso);
            color: var(--linen);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: fixed;
            height: 100%;
        }

        .sidebar h2 {
            color: var(--khaki);
            margin-bottom: 40px;
            text-align: center;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--cocoa);
            padding-bottom: 10px;
        }

        .menu-item {
            text-decoration: none;
            color: var(--linen);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover, .menu-item.active {
            background-color: var(--cocoa);
            color: var(--white);
        }

        /* CONTENIDO PRINCIPAL (Derecha) */
        .main-content {
            margin-left: 260px; /* Ancho del sidebar */
            flex: 1;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 { color: var(--espresso); }

        /* TARJETAS DE ESTADÍSTICAS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(74, 52, 42, 0.1);
            border-left: 5px solid var(--camel);
        }

        .card h3 { font-size: 0.9rem; color: var(--cocoa); margin-bottom: 10px; }
        .card p { font-size: 1.8rem; font-weight: bold; color: var(--espresso); }

        /* TABLA MODERNA */
        .table-container {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(74, 52, 42, 0.05);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        
        th {
            text-align: left;
            padding: 15px;
            background-color: var(--khaki);
            color: var(--espresso);
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--linen);
            color: var(--cocoa);
        }

        tr:hover { background-color: var(--linen); }

        /* BOTONES Y BADGES */
        .btn {
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
        }

        .btn-primary { background-color: var(--cocoa); color: white; }
        .btn-danger { background-color: #d9534f; color: white; }
        
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .bg-pending { background-color: #ffeeba; color: #856404; }
        .bg-success { background-color: #d4edda; color: #155724; }

    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>ORDER RAE</h2>
        <a href="{% url 'lista_pedidos' %}" class="menu-item active">
            <i class="fas fa-box"></i> Pedidos
        </a>
        <a href="#" class="menu-item">
            <i class="fas fa-users"></i> Clientes
        </a>
        <a href="#" class="menu-item">
            <i class="fas fa-chart-line"></i> Reportes
        </a>
        <a href="/admin/" class="menu-item">
            <i class="fas fa-cog"></i> Admin
        </a>
    </div>

    <!-- CONTENIDO -->
    <div class="main-content">
        {% block content %}
        <!-- Aquí se inyectará el contenido de cada página -->
        {% endblock %}
    </div>

</body>
</html>
