{% extends 'base.html' %}

{% block content %}
<div class="row g-4 mb-4">
    <div class="col-md-3">
        <div class="card-modern p-4">
            <div class="text-muted small">PRODUCCIÓN TOTAL</div>
            <div class="fs-2 fw-bold">{{ total_produccion }}</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card-modern p-4">
            <div class="text-muted small">PEDIDOS</div>
            <div class="fs-2 fw-bold">{{ total_pedidos }}</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card-modern p-4">
            <div class="text-muted small">VENTAS</div>
            <div class="fs-2 fw-bold">{{ total_ventas }}</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card-modern p-4">
            <div class="text-muted small">PRODUCTOS</div>
            <div class="fs-2 fw-bold">{{ total_productos }}</div>
        </div>
    </div>
</div>

<div class="card-modern p-4">
    <h4 class="fw-bold mb-3">Bienvenido al Sistema</h4>
    <p class="text-muted">Selecciona un módulo del menú lateral para comenzar.</p>
</div>
{% endblock %}
