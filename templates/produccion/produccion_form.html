{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card-modern">
            <h4 class="mb-4 fw-bold">{{ titulo }}</h4>
            <form method="post">
                {% csrf_token %}
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Producto</label>
                        {{ form.producto }} 
                        <!-- Nota: Django rendera el select automáticamente, puedes estilizarlo con clases en el forms.py -->
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Cantidad</label>
                        {{ form.cantidad_producida }}
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Fecha Inicio</label>
                        {{ form.fecha_inicio }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Fecha Fin Estimada</label>
                        {{ form.fecha_fin }}
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small text-muted">Estado</label>
                        {{ form.estado_produccion }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Proveedor (Opcional)</label>
                        {{ form.proveedor }}
                    </div>

                    <div class="col-12">
                        <label class="form-label small text-muted">Observaciones</label>
                        {{ form.observaciones }}
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-end gap-2">
                    <a href="{% url 'produccion:produccion_list' %}" class="btn btn-light border">Cancelar</a>
                    <button type="submit" class="btn btn-sand">Guardar Registro</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Script para estilizar los inputs de Django -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            if(input.type !== 'checkbox' && input.type !== 'hidden') {
                input.classList.add('form-control');
                if(input.tagName === 'SELECT') input.classList.replace('form-control', 'form-select');
            }
        });
    });
</script>
{% endblock %}
