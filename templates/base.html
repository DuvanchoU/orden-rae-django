{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ORDEN R.A.E ERP{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Tu CSS Personalizado -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar d-flex flex-column p-3" style="width: 260px;">
            <!-- LOGO DEL PROYECTO -->
            <div class="logo-container text-center mb-4">
                <a href="/" class="text-decoration-none">
                    <img src="{% static 'img/Logo_Orden_Negro.png' %}" 
                        alt="ORDEN R.A.E" 
                        class="img-fluid logo-img">
                </a>
            </div>
            <hr class="text-white-50">
                <ul class="nav nav-pills flex-column mb-auto">
                    <li class="nav-item">
                        <a href="{% url 'dashboard:dashboard_home' %}" class="nav-link">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link">
                            <i class="bi bi-box-seam me-2"></i> Inventario
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'produccion:produccion_list' %}" class="nav-link active">
                            <i class="bi bi-gear-wide-connected me-2"></i> Producción
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link">
                            <i class="bi bi-cart me-2"></i> Ventas
                        </a>
                    </li>
                </ul>
            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="https://via.placeholder.com/32" alt="" width="32" height="32" class="rounded-circle me-2">
                    <strong>Administrador</strong>
                </a>
                <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
                    <li><a class="dropdown-item" href="#">Configuración</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form method="post" action="{% url 'dashboard:logout' %}" class="d-inline">
                            {% csrf_token %}
                            <input type="hidden" name="next" value="{% url 'pagina:home' %}">
                            <button type="submit" class="dropdown-item border-0 bg-transparent text-white w-100 text-start">
                                <i class="bi bi-box-arrow-right me-2"></i>
                                Cerrar sesión
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Contenido Principal -->
        <div class="flex-grow-1 p-4" style="overflow-y: auto; height: 100vh;">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
