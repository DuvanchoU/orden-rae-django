{% extends 'base.html' %}

{% block title %}{{ titulo }} - Pedidos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card-modern">
            <h4 class="mb-4 fw-bold">{{ titulo }}</h4>
            <form method="post">
                {% csrf_token %}
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Cliente *</label>
                        {{ form.cliente }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Fecha Entrega Estimada</label>
                        {{ form.fecha_entrega_estimada }}
                    </div>
                    <div class="col-12">
                        <label class="form-label small text-muted">Dirección Entrega</label>
                        {{ form.direccion_entrega }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Estado *</label>
                        {{ form.estado_pedido }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted">Total Pedido</label>
                        <input type="text" class="form-control" value="0.00" readonly>
                    </div>
                    <div class="col-12">
                        <label class="form-label small text-muted">Observaciones</label>
                        {{ form.observaciones }}
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-end gap-2">
                    <a href="{% url 'ventas:pedido_list' %}" class="btn btn-light border">Cancelar</a>
                    <button type="submit" class="btn btn-sand">Guardar Pedido</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            if(input.type !== 'checkbox' && input.type !== 'hidden') {
                input.classList.add('form-control');
                if(input.tagName === 'SELECT') input.classList.replace('form-control', 'form-select');
            }
        });
    });
</script>
{% endblock %}
