{% extends 'base.html' %}

{% block title %}Eliminar Venta{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-modern text-center">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
            </div>
            <h4 class="fw-bold mb-3">¿Estás seguro?</h4>
            <p class="text-muted mb-4">
                Estás a punto de eliminar la venta <strong>#{{ object.numero_factura|default:object.id_venta }}</strong>.
                Esta acción no se puede deshacer.
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'ventas:venta_list' %}" class="btn btn-light border">Cancelar</a>
                    <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
